name: Build Linux DEB

on:
  workflow_call:
    inputs:
      ver:
        required: true
        type: string

jobs:
  build-deb:
    name: Build Linux (DEB)
    runs-on: ubuntu-latest
    # Debian trixie ships libadwaita 1.7.x; the ubuntu-latest runner only has
    # 1.5.0, which fails the `v1_6` feature gate. Building inside a container
    # also decouples the DEB from GitHub's runner-image release cadence.
    container: debian:trixie
    env:
      VER: ${{ inputs.ver }}
      LASTFM_PROXY_URL: ${{ secrets.LASTFM_PROXY_URL }}
    steps:
      - name: Deps
        run: |
          apt-get update
          apt-get install -y \
            curl ca-certificates git \
            build-essential pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libsqlite3-dev libasound2-dev \
            gettext

      - uses: actions/checkout@v6

      - name: Instalar Rust (rustup)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: Swatinem/rust-cache@v2

      - name: Compilar
        run: cargo build --release
        env:
          RUST_BACKTRACE: 1

      - name: Empaquetar DEB
        run: bash packaging/build-deb.sh

      - name: Subir artefacto
        uses: actions/upload-artifact@v7
        with:
          name: linux-deb
          path: target/debpkg/*.deb
