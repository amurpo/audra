name: Test

# Runs in two cases only:
#  - on a pull request that targets `main` (gates the merge into `main`)
#  - when `release.yml` calls it via `workflow_call` on push/merge to `main`
# It never triggers on plain commits to `dev`.
on:
  workflow_call:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE*'
      - '.gitignore'
      - 'docs/**'

jobs:
  test:
    name: Cargo test
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v6

      - name: Deps
        run: |
          dnf install -y \
            curl gcc \
            gtk4-devel libadwaita-devel \
            sqlite-devel pkg-config \
            alsa-lib-devel fontconfig-devel \
            gettext

      - name: Instalar Rust (rustup)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y \
            --default-toolchain stable \
            --component rustfmt \
            --component clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: Swatinem/rust-cache@v2

      # Formatting is informational: emit a GitHub warning annotation
      # instead of failing so it appears as a yellow triangle, not a red X.
      - name: Formato (advisory)
        run: cargo fmt --all -- --check || echo "::warning::Formatting issues — run cargo fmt"

      # Clippy gates the merge: warnings fail the build.
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --verbose
        env:
          RUST_BACKTRACE: 1
