name: Test

# Runs in two cases only:
#  - on a pull request that targets `main` (gates the merge into `main`)
#  - when `release.yml` calls it via `workflow_call` on push/merge to `main`
# It never triggers on plain commits to `dev`.
on:
  workflow_call:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE*'
      - '.gitignore'
      - 'docs/**'

jobs:
  test:
    name: Cargo test
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v6

      - name: Deps
        run: |
          dnf install -y \
            curl gcc \
            gtk4-devel libadwaita-devel \
            sqlite-devel pkg-config \
            alsa-lib-devel fontconfig-devel \
            gettext

      - name: Instalar Rust (rustup)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y \
            --default-toolchain stable \
            --component rustfmt \
            --component clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: Swatinem/rust-cache@v2

      # Pre-existing style is not the gate here, so formatting/lint are advisory.
      - name: Formato (advisory)
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --verbose
        env:
          RUST_BACKTRACE: 1
