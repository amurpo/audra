name: Nightly (dev)

on:
  push:
    branches:
      - dev
    paths-ignore:
      - '**.md'
      - 'LICENSE*'
      - '.gitignore'
      - 'docs/**'

jobs:
  meta:
    name: Build metadata
    runs-on: ubuntu-latest
    outputs:
      hash: ${{ steps.info.outputs.hash }}
      date: ${{ steps.info.outputs.date }}
      ver:  ${{ steps.info.outputs.ver }}
    steps:
      - uses: actions/checkout@v6
      - id: info
        run: |
          HASH=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%d)
          echo "hash=$HASH"  >> $GITHUB_OUTPUT
          echo "date=$DATE"  >> $GITHUB_OUTPUT
          echo "ver=nightly-${HASH}" >> $GITHUB_OUTPUT

  test:
    name: Tests
    uses: ./.github/workflows/test.yml
    secrets: inherit

  build-fedora:
    name: Build Fedora (RPM)
    needs: [meta, test]
    uses: ./.github/workflows/build-fedora.yml
    with:
      ver: ${{ needs.meta.outputs.ver }}
    secrets: inherit

  build-windows:
    name: Build Windows
    needs: [meta, test]
    uses: ./.github/workflows/build-windows.yml
    with:
      ver: ${{ needs.meta.outputs.ver }}
    secrets: inherit

  build-deb:
    name: Build Debian (DEB)
    needs: [meta, test]
    uses: ./.github/workflows/build-deb.yml
    with:
      ver: ${{ needs.meta.outputs.ver }}
    secrets: inherit

  publish:
    name: Publish nightly
    needs: [meta, build-fedora, build-windows, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist/
          merge-multiple: true

      - name: Delete previous nightly release
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish nightly release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: "Nightly ${{ needs.meta.outputs.date }} (${{ needs.meta.outputs.hash }})"
          prerelease: true
          generate_release_notes: false
          body: |
            Automated build from the `dev` branch. Not a stable release.

            **Commit:** `${{ github.sha }}`
            **Date:** ${{ needs.meta.outputs.date }}
          files: dist/**
