name: Build AppImage

on:
  workflow_call:
    inputs:
      ver:
        required: true
        type: string

jobs:
  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    container: debian:trixie
    env:
      VER: ${{ inputs.ver }}
      LASTFM_PROXY_URL: ${{ secrets.LASTFM_PROXY_URL }}
    steps:
      - name: Deps
        run: |
          apt-get update
          apt-get install -y \
            curl ca-certificates git file wget \
            build-essential pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libsqlite3-dev libasound2-dev \
            libfontconfig1-dev \
            gettext

      - uses: actions/checkout@v6

      - name: Instalar Rust (rustup)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: Swatinem/rust-cache@v2

      - name: Compilar
        run: cargo build --release
        env:
          RUST_BACKTRACE: 1

      - name: Descargar linuxdeploy
        run: |
          curl -fL -o linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          # El plugin GTK es un shell script, no un AppImage
          curl -fL -o /usr/local/bin/linuxdeploy-plugin-gtk \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x /usr/local/bin/linuxdeploy-plugin-gtk
          # Extraer linuxdeploy para no necesitar FUSE en el container
          ./linuxdeploy-x86_64.AppImage --appimage-extract
          mv squashfs-root linuxdeploy

      - name: Crear AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons
          mkdir -p AppDir/usr/share/locale
          cp target/release/audra AppDir/usr/bin/
          cp data/io.github.amurpo.audra.desktop AppDir/usr/share/applications/
          cp -r data/icons AppDir/usr/share/
          mkdir -p AppDir/usr/share/locale/es/LC_MESSAGES
          msgfmt po/es.po -o AppDir/usr/share/locale/es/LC_MESSAGES/audra.mo

      - name: Empaquetar AppImage
        run: |
          DEPLOY_GTK_VERSION=4 \
            ./linuxdeploy/AppRun \
            --appdir AppDir \
            --plugin gtk \
            --output appimage
        env:
          VERSION: ${{ inputs.ver }}
          ARCH: x86_64

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: "*.AppImage"
