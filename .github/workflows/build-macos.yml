name: Build macOS

on:
  workflow_call:
    inputs:
      ver:
        required: true
        type: string

jobs:
  build-macos:
    name: Build macOS (.zip)
    runs-on: macos-latest
    env:
      VER: ${{ inputs.ver }}
      LASTFM_PROXY_URL: ${{ secrets.LASTFM_PROXY_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Deps (Homebrew)
        run: brew install gtk4 libadwaita pkg-config sqlite librsvg gettext

      - uses: Swatinem/rust-cache@v2

      - name: Compilar
        run: cargo build --release

      - name: Bundlear dylibs y recursos
        run: |
          BREW=/opt/homebrew
          mkdir -p dist/audra/libs
          cp target/release/audra dist/audra/
          # Copia recursiva de dependencias usando una cola
          collect_deps() {
            local queue=("$1")
            while [ ${#queue[@]} -gt 0 ]; do
              local binary="${queue[0]}"
              queue=("${queue[@]:1}")
              otool -L "$binary" 2>/dev/null | tail -n +2 | awk '{print $1}' | while read dep; do
                [[ "$dep" != /opt/homebrew/* ]] && continue
                local name=$(basename "$dep")
                [ -f "dist/audra/libs/$name" ] && continue
                echo "Copiando: $name"
                cp "$dep" "dist/audra/libs/$name"
                install_name_tool -id "@executable_path/libs/$name" "dist/audra/libs/$name" 2>/dev/null || true
                queue+=("dist/audra/libs/$name")
              done
            done
          }
          # Recolectar deps del binario principal
          collect_deps dist/audra/audra
          # Corregir referencias en el binario principal
          for lib in dist/audra/libs/*.dylib; do
            name=$(basename "$lib")
            orig=$(otool -L dist/audra/audra | grep "$name" | awk '{print $1}')
            [ -n "$orig" ] && install_name_tool -change "$orig" "@executable_path/libs/$name" dist/audra/audra 2>/dev/null || true
          done
          # Corregir referencias entre dylibs
          for lib in dist/audra/libs/*.dylib; do
            otool -L "$lib" 2>/dev/null | tail -n +2 | awk '{print $1}' | while read dep; do
              [[ "$dep" != /opt/homebrew/* ]] && [[ "$dep" != @rpath/* ]] && continue
              name=$(basename "$dep")
              if [ ! -f "dist/audra/libs/$name" ]; then
                real=$(find /opt/homebrew -name "$name" 2>/dev/null | head -1)
                [ -n "$real" ] && cp "$real" "dist/audra/libs/$name" && \
                  install_name_tool -id "@executable_path/libs/$name" "dist/audra/libs/$name" 2>/dev/null || true
              fi
              install_name_tool -change "$dep" "@executable_path/libs/$name" "$lib" 2>/dev/null || true
            done
          done
          # GDK Pixbuf loaders
          if [ -d "$BREW/lib/gdk-pixbuf-2.0" ]; then
            mkdir -p dist/audra/lib
            cp -r "$BREW/lib/gdk-pixbuf-2.0" dist/audra/lib/
            find dist/audra/lib/gdk-pixbuf-2.0 -name "*.so" -o -name "*.dylib" | while read loader; do
              otool -L "$loader" 2>/dev/null | tail -n +2 | awk '{print $1}' | while read dep; do
                [[ "$dep" != /opt/homebrew/* ]] && [[ "$dep" != @rpath/* ]] && continue
                name=$(basename "$dep")
                if [ ! -f "dist/audra/libs/$name" ]; then
                  real=$(find /opt/homebrew -name "$name" 2>/dev/null | head -1)
                  [ -n "$real" ] && cp "$real" "dist/audra/libs/$name" && \
                    install_name_tool -id "@executable_path/libs/$name" "dist/audra/libs/$name" 2>/dev/null || true
                fi
                install_name_tool -change "$dep" "@executable_path/libs/$name" "$loader" 2>/dev/null || true
              done
            done
          fi
          # Schemas de GLib
          mkdir -p dist/audra/share/glib-2.0/schemas
          cp "$BREW/share/glib-2.0/schemas/"* dist/audra/share/glib-2.0/schemas/
          # Temas de iconos
          mkdir -p dist/audra/share/icons
          cp -r "$BREW/share/icons/Adwaita" dist/audra/share/icons/ || true
          cp -r "$BREW/share/icons/hicolor"  dist/audra/share/icons/ || true
          mkdir -p dist/audra/share/icons/hicolor/scalable/apps
          cp data/icons/hicolor/scalable/apps/com.audra.player.svg \
             dist/audra/share/icons/hicolor/scalable/apps/
          # GTK settings
          mkdir -p dist/audra/share/gtk-4.0
          cat > dist/audra/share/gtk-4.0/settings.ini << 'EOF'
          [Settings]
          gtk-icon-theme-name=Adwaita
          gtk-theme-name=Adwaita
          EOF
          # Catálogo de traducción (gettext)
          mkdir -p dist/audra/share/locale/es/LC_MESSAGES
          "$(brew --prefix gettext)/bin/msgfmt" po/es.po \
            -o dist/audra/share/locale/es/LC_MESSAGES/audra.mo
          # Script launcher
          cat > dist/audra/audra-launch.sh << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export DYLD_LIBRARY_PATH="$DIR/libs:$DYLD_LIBRARY_PATH"
          export GSETTINGS_SCHEMA_DIR="$DIR/share/glib-2.0/schemas"
          export GDK_PIXBUF_MODULEDIR="$DIR/lib/gdk-pixbuf-2.0/2.10.0/loaders"
          export GDK_PIXBUF_MODULE_FILE="$DIR/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache"
          export XDG_DATA_DIRS="$DIR/share:$XDG_DATA_DIRS"
          exec "$DIR/audra" "$@"
          EOF
          chmod +x dist/audra/audra-launch.sh

      - name: Empaquetar
        run: zip -r audra-${VER}-macos-arm64.zip dist/audra/

      - name: Subir artefacto
        uses: actions/upload-artifact@v7
        with:
          name: macos-zip
          path: audra-${{ inputs.ver }}-macos-arm64.zip
