name: Build Fedora

on:
  workflow_call:
    inputs:
      ver:
        required: true
        type: string

jobs:
  build-fedora:
    name: Build Fedora (RPM)
    runs-on: ubuntu-latest
    container: fedora:latest
    env:
      VER: ${{ inputs.ver }}
      LASTFM_PROXY_URL: ${{ secrets.LASTFM_PROXY_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Deps
        run: |
          dnf install -y \
            curl gcc \
            gtk4-devel libadwaita-devel \
            sqlite-devel pkg-config \
            alsa-lib-devel \
            gettext \
            rpm-build

      - name: Install Rust (rustup)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release
        env:
          RUST_BACKTRACE: 1

      - name: Package RPM
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp target/release/audra \
             data/io.github.amurpo.audra.desktop \
             data/io.github.amurpo.audra.metainfo.xml \
             data/icons/hicolor/scalable/apps/io.github.amurpo.audra.svg \
             po/es.po \
             ~/rpmbuild/BUILD/
          RPM_VER=$(echo "$VER" | tr '-' '~')
          rpmbuild -bb \
            --define "ver $RPM_VER" \
            --define "_sourcedir $HOME/rpmbuild/BUILD" \
            packaging/audra.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: fedora-rpm
          path: ~/rpmbuild/RPMS/**/*.rpm
