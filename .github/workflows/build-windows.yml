name: Build Windows

on:
  workflow_call:
    inputs:
      ver:
        required: true
        type: string

jobs:
  build-windows:
    name: Build Windows (.zip)
    runs-on: windows-latest
    env:
      VER: ${{ inputs.ver }}
      LASTFM_PROXY_URL: ${{ secrets.LASTFM_PROXY_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Deps (MSYS2)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-librsvg
            gettext

      - uses: Swatinem/rust-cache@v2

      - name: Compilar
        shell: msys2 {0}
        run: cargo build --release
        env:
          RUST_BACKTRACE: 1

      - name: Copiar DLLs
        shell: msys2 {0}
        run: |
          mkdir -p dist/audra
          cp target/release/audra.exe dist/audra/

          cp /mingw64/bin/*.dll dist/audra/

          # Schemas de GLib
          mkdir -p dist/audra/share/glib-2.0/schemas
          cp /mingw64/share/glib-2.0/schemas/* dist/audra/share/glib-2.0/schemas/

          # Tema de iconos Adwaita
          mkdir -p dist/audra/share/icons
          cp -r /mingw64/share/icons/Adwaita dist/audra/share/icons/
          cp -r /mingw64/share/icons/hicolor dist/audra/share/icons/

          # Icono de la aplicación
          mkdir -p dist/audra/share/icons/hicolor/scalable/apps
          cp data/icons/hicolor/scalable/apps/com.audra.player.svg \
             dist/audra/share/icons/hicolor/scalable/apps/
          cp data/icons/audra.ico dist/audra/

          # GDK Pixbuf loaders
          if [ -d /mingw64/lib/gdk-pixbuf-2.0 ]; then
            mkdir -p dist/audra/lib
            cp -r /mingw64/lib/gdk-pixbuf-2.0 dist/audra/lib/
          fi

          cp /mingw64/lib/gdk-pixbuf-2.0/2.10.0/loaders/*.dll dist/audra/lib/gdk-pixbuf-2.0/2.10.0/loaders/ || true

          # Catálogo de traducción (gettext)
          mkdir -p dist/audra/share/locale/es/LC_MESSAGES
          msgfmt po/es.po -o dist/audra/share/locale/es/LC_MESSAGES/audra.mo

          # libadwaita/GTK/GLib translations (for AboutDialog and other built-in strings)
          for cat in libadwaita gtk40 gtk40-properties glib20; do
            if [ -f /mingw64/share/locale/es/LC_MESSAGES/${cat}.mo ]; then
              cp /mingw64/share/locale/es/LC_MESSAGES/${cat}.mo \
                 dist/audra/share/locale/es/LC_MESSAGES/
            fi
          done

          # GTK settings
          mkdir -p dist/audra/share/gtk-4.0
          cat > dist/audra/share/gtk-4.0/settings.ini << 'EOF'
          [Settings]
          gtk-icon-theme-name=Adwaita
          gtk-theme-name=Adwaita
          EOF

      - name: Empaquetar zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist\audra -DestinationPath "audra-$env:VER-windows-x64.zip"

      - name: Instalar Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Crear instalador
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DMyAppVersion=$env:VER packaging\audra.iss

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            audra-${{ inputs.ver }}-windows-x64.zip
            packaging/audra-${{ inputs.ver }}-windows-x64-setup.exe
