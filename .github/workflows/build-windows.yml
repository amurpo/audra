name: Build Windows

on:
  workflow_call:
    inputs:
      ver:
        required: true
        type: string

jobs:
  build-windows:
    name: Build Windows (installer)
    runs-on: windows-latest
    env:
      VER: ${{ inputs.ver }}
      LASTFM_PROXY_URL: ${{ secrets.LASTFM_PROXY_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Deps (MSYS2 CLANG64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          cache: true
          install: >-
            mingw-w64-clang-x86_64-gtk4
            mingw-w64-clang-x86_64-libadwaita
            mingw-w64-clang-x86_64-sqlite3
            mingw-w64-clang-x86_64-pkg-config
            mingw-w64-clang-x86_64-rust
            mingw-w64-clang-x86_64-python
            mingw-w64-clang-x86_64-python-pip
            mingw-w64-clang-x86_64-librsvg
            gettext

      - uses: Swatinem/rust-cache@v2

      - name: Compilar
        shell: msys2 {0}
        run: cargo build --release
        env:
          RUST_BACKTRACE: 1

      - name: Copiar DLLs
        shell: msys2 {0}
        run: |
          mkdir -p dist/audra
          cp target/release/audra.exe dist/audra/

          cp /clang64/bin/*.dll dist/audra/

          # Schemas de GLib
          mkdir -p dist/audra/share/glib-2.0/schemas
          cp /clang64/share/glib-2.0/schemas/* dist/audra/share/glib-2.0/schemas/

          # Tema de iconos Adwaita
          mkdir -p dist/audra/share/icons
          cp -r /clang64/share/icons/Adwaita dist/audra/share/icons/
          cp -r /clang64/share/icons/hicolor dist/audra/share/icons/

          # App icon: SVG + PNG fallbacks so GTK finds it even if the
          # pixbuf SVG loader path isn't configured in the bundle.
          mkdir -p dist/audra/share/icons/hicolor/scalable/apps
          cp data/icons/hicolor/scalable/apps/io.github.amurpo.audra.svg \
             dist/audra/share/icons/hicolor/scalable/apps/
          for size in 16 24 32 48 64 128 256; do
            mkdir -p dist/audra/share/icons/hicolor/${size}x${size}/apps
            rsvg-convert -w $size -h $size \
              data/icons/hicolor/scalable/apps/io.github.amurpo.audra.svg \
              -o dist/audra/share/icons/hicolor/${size}x${size}/apps/io.github.amurpo.audra.png
          done
          cp data/icons/audra.ico dist/audra/

          # GDK Pixbuf loaders
          if [ -d /clang64/lib/gdk-pixbuf-2.0 ]; then
            mkdir -p dist/audra/lib
            cp -r /clang64/lib/gdk-pixbuf-2.0 dist/audra/lib/
          fi

          cp /clang64/lib/gdk-pixbuf-2.0/2.10.0/loaders/*.dll dist/audra/lib/gdk-pixbuf-2.0/2.10.0/loaders/ || true

          # Catálogo de traducción (gettext)
          mkdir -p dist/audra/share/locale/es/LC_MESSAGES
          msgfmt po/es.po -o dist/audra/share/locale/es/LC_MESSAGES/audra.mo

          # libadwaita/GTK/GLib translations (for AboutDialog and other built-in strings)
          for cat in libadwaita gtk40 gtk40-properties glib20; do
            if [ -f /clang64/share/locale/es/LC_MESSAGES/${cat}.mo ]; then
              cp /clang64/share/locale/es/LC_MESSAGES/${cat}.mo \
                 dist/audra/share/locale/es/LC_MESSAGES/
            fi
          done

          # GTK settings
          mkdir -p dist/audra/share/gtk-4.0
          cat > dist/audra/share/gtk-4.0/settings.ini << 'EOF'
          [Settings]
          gtk-icon-theme-name=Adwaita
          gtk-theme-name=Adwaita
          EOF

      - name: Instalar Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Crear instalador
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DMyAppVersion=$env:VER packaging\audra.iss

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: packaging/audra-${{ inputs.ver }}-windows-x64-setup.exe
