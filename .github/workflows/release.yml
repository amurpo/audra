name: Release

on:
  push:
    branches:
      - main

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      ver: ${{ steps.get.outputs.ver }}
    steps:
      - uses: actions/checkout@v4
      - id: get
        run: |
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "ver=$VER" >> $GITHUB_OUTPUT

  build-linux:
    needs: version
    name: Build Linux (RPM)
    runs-on: ubuntu-latest
    container: fedora:latest
    env:
      VER: ${{ needs.version.outputs.ver }}
      LASTFM_PROXY_URL: ${{ secrets.LASTFM_PROXY_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deps
        run: |
          dnf install -y \
            curl gcc \
            gtk4-devel libadwaita-devel \
            sqlite-devel pkg-config \
            alsa-lib-devel \
            rpm-build

      - name: Instalar Rust (rustup)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: Swatinem/rust-cache@v2

      - name: Compilar
        run: cargo build --release
        env:
          RUST_BACKTRACE: 1

      - name: Empaquetar RPM
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp target/release/audra \
             data/com.audra.player.desktop \
             data/icons/hicolor/scalable/apps/com.audra.player.svg \
             ~/rpmbuild/BUILD/
          rpmbuild -bb \
            --define "ver $VER" \
            --define "_sourcedir $HOME/rpmbuild/BUILD" \
            packaging/audra.spec

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: ~/rpmbuild/RPMS/**/*.rpm

  build-windows:
    needs: version
    name: Build Windows (.zip)
    runs-on: windows-latest
    env:
      VER: ${{ needs.version.outputs.ver }}
      LASTFM_PROXY_URL: ${{ secrets.LASTFM_PROXY_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deps (MSYS2)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-rust

      - name: Compilar
        shell: msys2 {0}
        run: cargo build --release
        env:
          RUST_BACKTRACE: 1

      - name: Empaquetar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\audra
          Copy-Item target\release\audra.exe dist\audra\

          # Copiar DLLs via ldd (dependencias directas)
          $mingw = "C:\msys64\mingw64\bin"
          $deps = (& "C:\msys64\usr\bin\ldd.exe" target\release\audra.exe) |
                  Select-String -SimpleMatch $mingw |
                  ForEach-Object { ($_ -split '\s+')[2] }
          $deps | ForEach-Object { Copy-Item $_ dist\audra\ -ErrorAction SilentlyContinue }

          # Copiar DLLs de GTK4/GDK/GLib que ldd no detecta como transitivas
          $extra = @(
            "libgdk_pixbuf-2.0-0.dll",
            "libcairo-2.dll",
            "libgio-2.0-0.dll",
            "libglib-2.0-0.dll",
            "libgobject-2.0-0.dll",
            "libgmodule-2.0-0.dll",
            "libpango-1.0-0.dll",
            "libpangocairo-1.0-0.dll",
            "libpangowin32-1.0-0.dll",
            "libffi-8.dll",
            "libintl-8.dll",
            "libpcre2-8-0.dll",
            "libharfbuzz-0.dll",
            "libfreetype-6.dll",
            "libfontconfig-1.dll",
            "libpixman-1-0.dll",
            "libcairo-gobject-2.dll",
            "libepoxy-0.dll",
            "libgraphene-1.0-0.dll",
            "libgtk-4-1.dll",
            "libadwaita-1-0.dll",
            "libpng16-16.dll",
            "zlib1.dll",
            "libbz2-1.dll",
            "libexpat-1.dll",
            "libiconv-2.dll",
            "libsqlite3-0.dll"
          )
          $extra | ForEach-Object {
            $src = Join-Path $mingw $_
            if (Test-Path $src) { Copy-Item $src dist\audra\ -ErrorAction SilentlyContinue }
          }

          # Copiar schemas de GLib (necesarios para GTK4)
          $schemasDir = "C:\msys64\mingw64\share\glib-2.0\schemas"
          if (Test-Path $schemasDir) {
            New-Item -ItemType Directory -Force dist\audra\share\glib-2.0\schemas
            Copy-Item "$schemasDir\*" dist\audra\share\glib-2.0\schemas\
          }

          # Copiar loaders de GDK-Pixbuf
          $loadersDir = "C:\msys64\mingw64\lib\gdk-pixbuf-2.0"
          if (Test-Path $loadersDir) {
            New-Item -ItemType Directory -Force dist\audra\lib\gdk-pixbuf-2.0
            Copy-Item $loadersDir dist\audra\lib\ -Recurse -ErrorAction SilentlyContinue
          }

          Compress-Archive -Path dist\audra -DestinationPath "audra-$env:VER-windows-x64.zip"

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: audra-${{ needs.version.outputs.ver }}-windows-x64.zip

  build-macos:
    needs: version
    name: Build macOS (.zip)
    runs-on: macos-latest
    env:
      VER: ${{ needs.version.outputs.ver }}
      LASTFM_PROXY_URL: ${{ secrets.LASTFM_PROXY_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deps (Homebrew)
        run: brew install gtk4 libadwaita pkg-config sqlite

      - uses: Swatinem/rust-cache@v2

      - name: Compilar
        run: cargo build --release

      - name: Empaquetar
        run: zip -j audra-${VER}-macos-x64.zip target/release/audra

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: audra-${{ needs.version.outputs.ver }}-macos-x64.zip

  release:
    needs: [version, build-linux, build-windows, build-macos]
    name: Publicar Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar artefactos
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.ver }}
          name: Audra v${{ needs.version.outputs.ver }}
          files: dist/**
          generate_release_notes: true
