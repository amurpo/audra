name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'LICENSE*'
      - '.gitignore'
      - 'docs/**'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      ver: ${{ steps.get.outputs.ver }}
    steps:
      - uses: actions/checkout@v6
      - id: get
        run: |
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "ver=$VER" >> $GITHUB_OUTPUT

  build-linux:
    needs: version
    name: Build Linux (RPM)
    runs-on: ubuntu-latest
    container: fedora:latest
    env:
      VER: ${{ needs.version.outputs.ver }}
      LASTFM_PROXY_URL: ${{ secrets.LASTFM_PROXY_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Deps
        run: |
          dnf install -y \
            curl gcc \
            gtk4-devel libadwaita-devel \
            sqlite-devel pkg-config \
            alsa-lib-devel \
            rpm-build

      - name: Instalar Rust (rustup)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: Swatinem/rust-cache@v2

      - name: Compilar
        run: cargo build --release
        env:
          RUST_BACKTRACE: 1

      - name: Empaquetar RPM
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp target/release/audra \
             data/com.audra.player.desktop \
             data/icons/hicolor/scalable/apps/com.audra.player.svg \
             ~/rpmbuild/BUILD/
          rpmbuild -bb \
            --define "ver $VER" \
            --define "_sourcedir $HOME/rpmbuild/BUILD" \
            packaging/audra.spec

      - name: Subir artefacto
        uses: actions/upload-artifact@v7
        with:
          name: linux-rpm
          path: ~/rpmbuild/RPMS/**/*.rpm

  build-windows:
    needs: version
    name: Build Windows (.zip)
    runs-on: windows-latest
    env:
      VER: ${{ needs.version.outputs.ver }}
      LASTFM_PROXY_URL: ${{ secrets.LASTFM_PROXY_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Deps (MSYS2)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip

      - name: Compilar
        shell: msys2 {0}
        run: cargo build --release
        env:
          RUST_BACKTRACE: 1

      - name: Copiar DLLs
        shell: msys2 {0}
        run: |
          mkdir -p dist/audra
          cp target/release/audra.exe dist/audra/

          cp /mingw64/bin/*.dll dist/audra/

          # Schemas de GLib
          mkdir -p dist/audra/share/glib-2.0/schemas
          cp /mingw64/share/glib-2.0/schemas/* dist/audra/share/glib-2.0/schemas/

          # Tema de iconos Adwaita (necesario para iconos de controles)
          mkdir -p dist/audra/share/icons
          cp -r /mingw64/share/icons/Adwaita dist/audra/share/icons/
          cp -r /mingw64/share/icons/hicolor dist/audra/share/icons/

          # Icono de la aplicación
          mkdir -p dist/audra/share/icons/hicolor/scalable/apps
          cp data/icons/hicolor/scalable/apps/com.audra.player.svg \
             dist/audra/share/icons/hicolor/scalable/apps/

          # GDK Pixbuf loaders (para renderizar SVG e imágenes)
          if [ -d /mingw64/lib/gdk-pixbuf-2.0 ]; then
            mkdir -p dist/audra/lib
            cp -r /mingw64/lib/gdk-pixbuf-2.0 dist/audra/lib/
          fi

          # Librsvg (necesario para renderizar SVGs como iconos)
          cp /mingw64/lib/gdk-pixbuf-2.0/2.10.0/loaders/*.dll dist/audra/lib/gdk-pixbuf-2.0/2.10.0/loaders/ || true

          # GTK settings por defecto (tema visual)
          mkdir -p dist/audra/share/gtk-4.0
          cat > dist/audra/share/gtk-4.0/settings.ini << 'EOF'
          [Settings]
          gtk-icon-theme-name=Adwaita
          gtk-theme-name=Adwaita
          EOF

      - name: Empaquetar zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist\audra -DestinationPath "audra-$env:VER-windows-x64.zip"

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: audra-${{ needs.version.outputs.ver }}-windows-x64.zip

  build-macos:
    needs: version
    name: Build macOS (.zip)
    runs-on: macos-latest
    env:
      VER: ${{ needs.version.outputs.ver }}
      LASTFM_PROXY_URL: ${{ secrets.LASTFM_PROXY_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Deps (Homebrew)
        run: brew install gtk4 libadwaita pkg-config sqlite

      - uses: Swatinem/rust-cache@v2

      - name: Compilar
        run: cargo build --release

      - name: Empaquetar
        run: zip -j audra-${VER}-macos-arm64.zip target/release/audra

      - name: Subir artefacto
        uses: actions/upload-artifact@v7
        with:
          name: macos-zip
          path: audra-${{ needs.version.outputs.ver }}-macos-arm64.zip

  release:
    needs: [version, build-linux, build-windows, build-macos]
    name: Publicar Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar artefactos
        uses: actions/download-artifact@v7
        with:
          path: dist/
          merge-multiple: true

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.version.outputs.ver }}
          name: Audra v${{ needs.version.outputs.ver }}
          files: dist/**
          generate_release_notes: true
