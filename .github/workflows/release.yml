name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'LICENSE*'
      - '.gitignore'
      - 'docs/**'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      ver: ${{ steps.get.outputs.ver }}
    steps:
      - uses: actions/checkout@v6
      - id: get
        run: |
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "ver=$VER" >> $GITHUB_OUTPUT
          
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  build-linux:
    needs: [version, test]
    uses: ./.github/workflows/build-linux.yml
    with:
      ver: ${{ needs.version.outputs.ver }}
    secrets: inherit

  build-windows:
    needs: [version, test]
    uses: ./.github/workflows/build-windows.yml
    with:
      ver: ${{ needs.version.outputs.ver }}
    secrets: inherit

  build-macos:
    needs: [version, test]
    uses: ./.github/workflows/build-macos.yml
    with:
      ver: ${{ needs.version.outputs.ver }}
    secrets: inherit

  release:
    needs: [version, build-linux, build-windows, build-macos]
    name: Publicar Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar artefactos
        uses: actions/download-artifact@v7
        with:
          path: dist/
          merge-multiple: true

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.version.outputs.ver }}
          name: Audra v${{ needs.version.outputs.ver }}
          files: dist/**
          generate_release_notes: true
